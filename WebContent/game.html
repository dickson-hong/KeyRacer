<!DOCTYPE HTML>
<html lang="en">

<head>
    <link rel="stylesheet" href="index.css">
    <title>Playing KeyRacer</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <p>Hello my friends</p>

    <h2 class="morse-display" id="letters"></h2>
    <div class="display-box">
        <h2 class="morse-display" id="typed-char"></h2>
        <h2 class="morse-display" id="typed-morse"></h2>
        <h2 class="morse-display" id="morse-assist"></h2>
    </div>
    <div class="no-space-wrapper">
        <span class="correct morse-display" id="correct-text"></span>
        <span class="current morse-display" id="current-char"></span>
        <span class="morse-display" id="remaining-text"></span>
    </div>
    <script type="module" src="../dist/main.js"></script>
</body>

</html>
